name = "AppleScript"
grammar = "applescript"
path_suffixes = ["applescript", "scpt", "scptd"]
line_comments = ["-- ", "# "]
block_comment = ["(* ", " *)"]
autoclose_before = ",.;:})]"
word_characters = ["_"]
first_line_pattern = '^#!.*\bosascript\b'

[[brackets]]
start = "("
end = ")"
close = true
newline = true

[[brackets]]
start = "{"
end = "}"
close = true
newline = true

[[brackets]]
start = "["
end = "]"
close = true
newline = true

[[brackets]]
start = "(*"
end = "*)"
close = true
newline = false

[[brackets]]
start = "\""
end = "\""
close = true
newline = false
not_in = ["string", "comment"]
